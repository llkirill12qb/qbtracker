<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Terminal</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #111827;
        }

        .navbar {
            background: #111827;
            color: white;
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .title {
            font-size: 22px;
            font-weight: bold;
        }

        .navbar .links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .terminal-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        .scan-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 240px;
            padding: 14px;
            font-size: 18px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
        }

        button {
            padding: 14px 22px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .hint {
            margin-top: 12px;
            color: #6b7280;
        }

        .result-card {
            display: none;
            margin-top: 28px;
            padding: 24px;
            border-radius: 16px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
        }

        .result-content {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .photo-box {
            width: 160px;
            height: 160px;
            border-radius: 16px;
            overflow: hidden;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-placeholder {
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            padding: 10px;
        }

        .result-info h2 {
            margin: 0 0 12px 0;
            font-size: 30px;
        }

        .badge {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            font-weight: bold;
            margin-bottom: 14px;
        }

        .badge-in {
            background: #dcfce7;
            color: #166534;
        }

        .badge-out {
            background: #fee2e2;
            color: #991b1b;
        }

        .meta {
            font-size: 16px;
            color: #374151;
            margin: 6px 0;
        }

        .error-box {
            display: none;
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 10px;
            background: #fee2e2;
            color: #991b1b;
            font-weight: bold;
        }

        @media (max-width: 640px) {
            .result-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .photo-box {
                width: 130px;
                height: 130px;
            }

            .result-info h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="title">Time Tracking SaaS</div>
        <div class="links">
            <a href="/dashboard">Dashboard</a>
            <a href="/employees-page">Employees</a>
            <a href="/terminal">Terminal</a>
        </div>
    </div>

    <div class="container">
        <div class="terminal-box">
            <h1>Scan Terminal</h1>

            <div class="scan-row">
                <input
                    id="cardInput"
                    type="text"
                    placeholder="Scan QR / Enter Card ID"
                    autofocus
                />
                <button onclick="submitScan()">Submit</button>
            </div>

            <div class="hint">
                Scan the employee QR code or enter card ID manually.
            </div>

            <div id="errorBox" class="error-box"></div>

            <div id="resultCard" class="result-card">
                <div class="result-content">
                    <div class="photo-box">
                        <img id="employeePhoto" src="" alt="Employee photo" />
                        <div id="photoPlaceholder" class="photo-placeholder">
                            No photo
                        </div>
                    </div>

                    <div class="result-info">
                        <h2 id="employeeName">Employee Name</h2>
                        <div id="eventBadge" class="badge">check-in</div>
                        <div id="scanTime" class="meta">Time:</div>
                        <div id="cardValue" class="meta">Card ID:</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cardInput = document.getElementById("cardInput");
        const resultCard = document.getElementById("resultCard");
        const employeePhoto = document.getElementById("employeePhoto");
        const photoPlaceholder = document.getElementById("photoPlaceholder");
        const employeeName = document.getElementById("employeeName");
        const eventBadge = document.getElementById("eventBadge");
        const scanTime = document.getElementById("scanTime");
        const cardValue = document.getElementById("cardValue");
        const errorBox = document.getElementById("errorBox");

        async function submitScan() {
            const cardId = cardInput.value.trim();

            if (!cardId) {
                showError("Please enter or scan card ID");
                return;
            }

            hideError();

            try {
                const response = await fetch(`/scan?card_id=${encodeURIComponent(cardId)}`, {
                    method: "POST"
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.detail || "Scan failed");
                    return;
                }

                employeeName.textContent = data.employee_name;
                scanTime.textContent = "Time: " + new Date(data.timestamp).toLocaleString();
                cardValue.textContent = "Card ID: " + cardId;

                eventBadge.textContent = data.event;
                eventBadge.className = "badge " + (data.event === "check-in" ? "badge-in" : "badge-out");

                if (data.photo_url) {
                    employeePhoto.src = data.photo_url + "?t=" + Date.now();
                    employeePhoto.style.display = "block";
                    photoPlaceholder.style.display = "none";
                } else {
                    employeePhoto.style.display = "none";
                    photoPlaceholder.style.display = "block";
                }

                resultCard.style.display = "block";
                cardInput.value = "";
                cardInput.focus();
            } catch (error) {
                showError("Server connection error");
            }
        }

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = "block";
        }

        function hideError() {
            errorBox.style.display = "none";
            errorBox.textContent = "";
        }

        cardInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                submitScan();
            }
        });
    </script>
</body>
</html>
